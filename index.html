<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA - Modern Dark Edition</title>
    <style>
        :root {
            --white: #FFFFFF;
            --light-grey: #F7F7F7;
            --border-grey: #E5E5E5;
            --text-dark: #4B4B4B;
            --mafia-red: #FF4B4B;
            --police-blue: #1CB0F6;
            --timer-gold: #FFC800;
            --success-green: #58CC02;
            --bg-color: #F7F7F7;
            --card-bg: #FFFFFF;
            --input-bg: #F7F7F7;
        }

        /* Variables Mode Sombre */
        body.dark-mode {
            --bg-color: #131F24;
            --card-bg: #1B292F;
            --border-grey: #38464F;
            --text-dark: #E5E5E5;
            --light-grey: #131F24;
            --input-bg: #1B292F;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: all 0.4s ease;
        }

        /* Toggle Mode Sombre */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--border-grey);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            border: none;
            color: var(--text-dark);
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border: 2px solid var(--border-grey);
            border-bottom: 6px solid var(--border-grey);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 { color: var(--police-blue); font-size: 2rem; margin-bottom: 20px; text-transform: lowercase; font-weight: 900; }

        input {
            width: 85%;
            padding: 15px;
            margin-bottom: 12px;
            border: 2px solid var(--border-grey);
            border-radius: 15px;
            background: var(--input-bg);
            color: var(--text-dark);
            font-size: 1rem;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.1s;
            margin-top: 10px;
        }

        button:active { transform: translateY(3px); }

        .btn-primary {
            background-color: var(--police-blue);
            color: white;
            border-bottom: 4px solid #1899D6;
        }

        .btn-secondary {
            background-color: var(--card-bg);
            color: #afafaf;
            border: 2px solid var(--border-grey);
            border-bottom: 4px solid var(--border-grey);
        }

        /* Dossier Confidentiel (s'adapte au mode sombre) */
        .folder {
            background: #FFF9E5;
            border: 2px solid #F0D58E;
            color: #4B4B4B;
            border-radius: 10px;
            padding: 40px 20px;
            margin: 20px 0;
            box-shadow: 0 4px 0 #F0D58E;
            animation: openFolder 0.5s ease;
        }

        /* Jauge */
        .timer-container {
            width: 100%;
            height: 15px;
            background: var(--border-grey);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--success-green);
            transition: width 1s linear;
        }

        #big-timer { font-size: 3.5rem; font-weight: 900; margin: 10px 0; }

        /* Liste des joueurs */
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .player-tile {
            background: var(--card-bg);
            border: 2px solid var(--border-grey);
            border-bottom: 4px solid var(--border-grey);
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
        }
        .player-tile.dead { opacity: 0.3; text-decoration: line-through; }

        .hidden { display: none !important; }

        /* Modes Couleurs Pleines */
        .bg-mafia { background-color: var(--mafia-red) !important; color: white !important; }
        .bg-police { background-color: var(--police-blue) !important; color: white !important; }
    </style>
</head>
<body id="body-bg">

<button class="theme-toggle" onclick="toggleTheme()">🌙 MODE SOMBRE</button>

<audio id="bg-music" loop><source src="ambiance.mp3" type="audio/mpeg"></audio>

<div class="container">
    <h1>mafia</h1>

    <div id="setup-screen">
        <div id="player-inputs">
            <input type="text" placeholder="nom du joueur" class="player-name">
            <input type="text" placeholder="nom du joueur" class="player-name">
            <input type="text" placeholder="nom du joueur" class="player-name">
        </div>
        <button onclick="addInput()" class="btn-secondary">+ ajouter un agent</button>
        <button class="btn-primary" onclick="startGame(true)">c'est parti !</button>
    </div>

    <div id="reveal-screen" class="hidden">
        <p>passe le téléphone à</p>
        <h2 id="target-name">---</h2>
        <button id="show-btn" class="btn-primary" onclick="showRole()">ouvrir le dossier</button>
        <div id="role-result" class="hidden">
            <div id="role-folder" class="folder">
                <span id="role-text" style="font-size: 1.5rem; font-weight: 900;">---</span>
            </div>
            <button class="btn-primary" onclick="nextStep()" style="background:var(--card-bg); color:var(--text-dark)">compris</button>
        </div>
    </div>

    <div id="master-screen" class="hidden">
        <div id="sky-anim" style="font-size: 4rem; margin: 20px;">☀️</div>
        <div class="timer-container"><div id="timer-bar"></div></div>
        <div id="big-timer">05:00</div>
        <button class="btn-secondary" onclick="addMinute()">+ 1 minute</button>
        <div class="player-grid" id="elimination-list"></div>
    </div>
</div>

<script>
    let players = [];
    let currentIndex = 0;
    let timeLeft = 300;
    let totalTime = 300;
    let timerInterval = null;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const music = document.getElementById('bg-music');

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        document.querySelector('.theme-toggle').innerText = isDark ? "☀️ MODE CLAIR" : "🌙 MODE SOMBRE";
    }

    function speak(text) {
        return new Promise(resolve => {
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'fr-FR'; s.pitch = 1; s.rate = 0.85;
            s.onend = resolve;
            window.speechSynthesis.speak(s);
            setTimeout(resolve, text.length * 80 + 1500);
        });
    }

    function addInput() {
        const input = document.createElement('input');
        input.type = 'text'; input.placeholder = 'nom du joueur'; input.className = 'player-name';
        document.getElementById('player-inputs').appendChild(input);
    }

    async function startGame(first = false) {
        if (first) {
            const names = Array.from(document.querySelectorAll('.player-name')).map(i => i.value.trim()).filter(n => n !== "");
            if (names.length < 3) return alert("Minimum 3 joueurs !");
            window.playerPool = names;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            music.play().catch(() => {});
        }
        let mCount = Math.max(1, Math.floor(window.playerPool.length / 3));
        let roles = [];
        for(let i=0; i<mCount; i++) roles.push({n:'Mafieux 🔫', t:'mafia'});
        while(roles.length < window.playerPool.length) roles.push({n:'Policier 👮‍♂️', t:'police'});
        roles.sort(() => Math.random() - 0.5);
        players = window.playerPool.map((name, i) => ({ name, role: roles[i], alive: true }));
        currentIndex = 0;
        timeLeft = 300; totalTime = 300;

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('master-screen').classList.add('hidden');
        document.getElementById('reveal-screen').classList.remove('hidden');
        updateReveal();
    }

    function updateReveal() {
        document.getElementById('target-name').innerText = players[currentIndex].name;
        document.getElementById('role-result').classList.add('hidden');
        document.getElementById('show-btn').classList.remove('hidden');
        document.body.classList.remove('bg-mafia', 'bg-police');
    }

    function showRole() {
        const r = players[currentIndex].role;
        document.getElementById('role-text').innerText = r.n;
        document.getElementById('role-result').classList.remove('hidden');
        document.getElementById('show-btn').classList.add('hidden');
        document.body.classList.add(r.t === 'mafia' ? 'bg-mafia' : 'bg-police');
    }

    function nextStep() {
        currentIndex++;
        if (currentIndex < players.length) updateReveal();
        else startMasterMode();
    }

    async function startMasterMode() {
        document.getElementById('reveal-screen').classList.add('hidden');
        document.getElementById('master-screen').classList.remove('hidden');
        document.getElementById('sky-anim').innerText = "🌙";
        await speak("La nuit commence. Fermez les yeux.");
        await new Promise(r => setTimeout(r, 2000));
        await speak("Mafieux, réveillez-vous et reconnaissez-vous.");
        await new Promise(r => setTimeout(r, 8000));
        await speak("Mafieux, rendormez-vous.");
        document.getElementById('sky-anim').innerText = "☀️";
        await speak("Le soleil se lève ! Trouvez le traître.");
        renderPlayers(); startTimer();
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('big-timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            let percent = (timeLeft / totalTime) * 100;
            const bar = document.getElementById('timer-bar');
            bar.style.width = percent + "%";
            if(percent < 30) bar.style.background = "var(--mafia-red)";
            if (timeLeft <= 0) { clearInterval(timerInterval); speak("Temps écoulé ! Votez !"); }
            timeLeft--;
        }, 1000);
    }

    function addMinute() { timeLeft += 60; totalTime = Math.max(totalTime, timeLeft); startTimer(); }

    function renderPlayers() {
        const list = document.getElementById('elimination-list');
        list.innerHTML = "";
        players.forEach((p, i) => {
            const tile = document.createElement('div');
            tile.className = `player-tile ${p.alive ? '' : 'dead'}`;
            tile.innerText = p.name;
            tile.onclick = () => eliminate(i);
            list.appendChild(tile);
        });
    }

    async function eliminate(i) {
        if(!players[i].alive) return;
        players[i].alive = false; renderPlayers();
        await speak(players[i].name + " était " + players[i].role.n);
        const aliveMafia = players.filter(pl => pl.alive && pl.role.t === 'mafia').length;
        if(aliveMafia === 0) { await speak("La police gagne !"); location.reload(); }
    }
</script>
</body>
</html>
