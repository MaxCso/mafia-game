<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL MAFIOSO</title>
    <style>
        :root {
            --red: #ff3131; --border: #333; --paper: #e8dcc4;
            --text-dark: #1a1a1a; --text-light: #d0d0d0;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: #0a0a0a url('bg-main.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-light);
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 1;
        }

        .container {
            width: 85%; max-width: 380px; padding: 20px;
            background: rgba(15, 15, 15, 0.95); border: 1px solid var(--border);
            box-shadow: 0 0 50px rgba(0,0,0,1); position: relative; z-index: 2;
            border-radius: 8px; text-align: center;
        }

        h1 { font-size: 1.8rem; color: var(--red); letter-spacing: 8px; margin-bottom: 20px; }

        input {
            width: 90%; padding: 12px; background: #000; border: 1px solid var(--border);
            color: var(--red); margin-bottom: 8px; border-radius: 4px; text-align: center; font-family: inherit;
        }

        button {
            width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border); color: #aaa;
            text-transform: uppercase; cursor: pointer; border-radius: 4px; font-family: inherit;
        }

        .btn-main { background: #800000; color: white; border: 1px solid var(--red); font-weight: bold; margin-top: 10px; }

        #target-name { font-size: 2.2rem; color: #fff; margin: 15px 0; display: block; font-weight: bold; }

        #role-display {
            background: var(--paper); color: var(--text-dark);
            margin: 20px 0; padding: 0; border-radius: 4px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            transform: rotate(-1deg); display: none;
        }

        .role-image-container {
            width: 150px; height: 150px; margin: 20px auto;
            border: 6px solid #fff; background-size: cover; background-position: center;
        }

        .stamp {
            border: 4px solid #8a2a2a; color: #8a2a2a; padding: 8px 15px;
            font-weight: bold; font-size: 1.4rem; text-transform: uppercase;
            display: inline-block; transform: rotate(-10deg); margin-bottom: 20px;
        }

        #big-timer { font-size: 4rem; color: #fff; margin: 10px 0; font-weight: bold; }
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .player-card { padding: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.7); font-size: 0.8rem; }
        .player-card.dead { opacity: 0.2; text-decoration: line-through; }

        .hidden { display: none !important; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .night-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000 url('bg-night.jpg') no-repeat center center; background-size: cover; z-index: 1000; }
    </style>
</head>
<body>

<div id="start-overlay">
    <button class="btn-main" style="width: auto; padding: 20px 40px;" onclick="initAudio()">LANCER LA PARTIE</button>
</div>

<audio id="bg-music" loop><source src="ambiance.mp3" type="audio/mpeg"></audio>

<div class="container hidden" id="game-ui">
    <h1>EL MAFIOSO</h1>

    <div id="setup-screen">
        <div id="player-inputs">
            <input type="text" placeholder="NOM DU JOUEUR" class="player-name">
            <input type="text" placeholder="NOM DU JOUEUR" class="player-name">
            <input type="text" placeholder="NOM DU JOUEUR" class="player-name">
        </div>
        <button onclick="addInput()">+ AJOUTER UN SUSPECT</button>
        <button class="btn-main" onclick="startGame()">DÉBUTER L'ENQUÊTE</button>
    </div>

    <div id="reveal-screen" class="hidden">
        <p style="color: #888; margin: 0;">DOSSIER DE :</p>
        <span id="target-name">---</span>
        <button id="show-btn" class="btn-main" onclick="showRole()">CONSULTER LE DOSSIER</button>
        
        <div id="role-display">
            <div style="font-size: 0.6rem; text-align: left; padding: 5px 10px; color:#555;">TOP SECRET // REF-992</div>
            <div id="role-image" class="role-image-container"></div>
            <div id="role-text" class="stamp">---</div>
            <button onclick="nextStep()" style="color:#000; border-color:#000; background:none; margin-bottom: 15px; width: 80%;">FERMER</button>
        </div>
    </div>

    <div id="master-screen" class="hidden">
        <div id="big-timer">05:00</div>
        <div class="player-grid" id="elimination-list"></div>
        <button onclick="addMinute()" style="margin-top:20px; color: #ffcf1b;">+ 1 MINUTE</button>
    </div>
</div>

<div id="night-overlay" class="night-overlay hidden"></div>

<script>
    let players = [];
    let currentIndex = 0;
    let timeLeft = 300;
    let timerInterval = null;
    const music = document.getElementById('bg-music');

    // Pré-chargement des objets Audio
    const audioObj = {
        debut: new Audio('voix-debut.mp3'),
        nuit: new Audio('voix-nuit.mp3'),
        mafiaReveil: new Audio('voix-mafia-reveil.mp3'),
        mafiaDodo: new Audio('voix-mafia-dodo.mp3'),
        underReveil: new Audio('voix-under-reveil.mp3'),
        jour: new Audio('voix-jour.mp3'),
        soixante: new Audio('voix-60s.mp3'),
        vote: new Audio('voix-chrono-fin.mp3')
    };

    function initAudio() {
        music.volume = 0.2;
        music.play().catch(() => {});
        document.getElementById('start-overlay').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
    }

    // Fonction de lecture ultra-sécurisée
    async function playVoice(key, durationFallback = 3000) {
        return new Promise(async (resolve) => {
            music.pause();
            const snd = audioObj[key];
            let hasPlayed = false;

            if (snd) {
                snd.currentTime = 0;
                snd.play().then(() => { hasPlayed = true; }).catch(e => console.log("Play failed, switching to timer"));
                
                snd.onended = () => {
                    music.play();
                    resolve();
                };
            }

            // Sécurité : Si le son ne finit pas ou ne se lance pas, on attend la durée estimée
            setTimeout(() => {
                if (!hasPlayed || snd.paused) {
                    music.play();
                    resolve();
                }
            }, durationFallback);
        });
    }

    async function speakRobot(text) {
        music.pause();
        const s = new SpeechSynthesisUtterance(text);
        s.lang = 'fr-FR'; s.onend = () => music.play();
        window.speechSynthesis.speak(s);
    }

    function addInput() {
        const input = document.createElement('input');
        input.type = 'text'; input.placeholder = 'NOM DU JOUEUR'; input.className = 'player-name';
        document.getElementById('player-inputs').appendChild(input);
    }

    function startGame() {
        const names = Array.from(document.querySelectorAll('.player-name')).map(i => i.value.trim()).filter(n => n !== "");
        if (names.length < 3) return alert("3 suspects min.");
        let roles = [];
        let mCount = Math.max(1, Math.floor(names.length / 3));
        for(let i=0; i<mCount; i++) roles.push({n:'MAFIEUX', t:'mafia'});
        if(names.length >= 6) roles.push({n:'INFILTRÉ', t:'undercover'});
        while(roles.length < names.length) roles.push({n:'POLICE', t:'police'});
        roles.sort(() => Math.random() - 0.5);
        players = names.map((name, i) => ({ name, role: roles[i], alive: true }));
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('reveal-screen').classList.remove('hidden');
        updateReveal();
    }

    function updateReveal() {
        document.getElementById('target-name').innerText = players[currentIndex].name;
        document.getElementById('role-display').style.display = 'none';
        document.getElementById('show-btn').classList.remove('hidden');
    }

    function showRole() {
        const r = players[currentIndex].role;
        document.getElementById('role-text').innerText = r.n;
        document.getElementById('role-image').style.backgroundImage = `url('role-${r.t}.png')`;
        document.getElementById('role-display').style.display = 'block';
        document.getElementById('show-btn').classList.add('hidden');
    }

    function nextStep() {
        currentIndex++;
        if (currentIndex < players.length) updateReveal();
        else startMasterMode();
    }

    async function startMasterMode() {
        // Bloquer l'UI
        document.getElementById('reveal-screen').classList.add('hidden');
        document.getElementById('master-screen').classList.remove('hidden');
        
        const night = document.getElementById('night-overlay');
        night.classList.remove('hidden');

        // Séquence chronométrée et sécurisée
        await playVoice('debut', 6000); // Attend 6s si le son bug
        await playVoice('nuit', 4000);
        await new Promise(r => setTimeout(r, 2000));
        await playVoice('mafiaReveil', 5000);
        await new Promise(r => setTimeout(r, 8000)); // Temps de reconnaissance
        await playVoice('mafiaDodo', 4000);

        if(players.some(p => p.role.t === 'undercover')) {
            await new Promise(r => setTimeout(r, 2000));
            await playVoice('underReveil', 5000);
            await new Promise(r => setTimeout(r, 7000));
        }

        // On libère l'écran AVANT de lancer le dernier son et le chrono
        night.classList.add('hidden');
        await playVoice('jour', 4000);
        
        renderPlayers();
        startTimer();
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('big-timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            if (timeLeft === 60) playVoice('soixante', 3000);
            if (timeLeft <= 0) { clearInterval(timerInterval); playVoice('vote', 5000); }
        }, 1000);
    }

    function renderPlayers() {
        const list = document.getElementById('elimination-list');
        list.innerHTML = "";
        players.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = `player-card ${p.alive ? '' : 'dead'}`;
            card.innerText = p.name;
            card.onclick = () => eliminate(i);
            list.appendChild(card);
        });
    }

    function addMinute() { timeLeft += 60; }

    async function eliminate(i) {
        if(!players[i].alive) return;
        players[i].alive = false;
        renderPlayers();
        await speakRobot(players[i].name + " était " + players[i].role.n);
        if(players.filter(p => p.alive && p.role.t === 'mafia').length === 0) {
            alert("LA POLICE GAGNE !");
            location.reload();
        }
    }
</script>
</body>
</html>
