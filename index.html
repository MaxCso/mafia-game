<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Mafieux</title>
    <style>
        :root {
            --red: #ff3131;
            --blue: #00d2ff;
            --gold: #ffcf1b;
            --border: #333;
            --paper: #e8dcc4;
            --text-dark: #1a1a1a;
            --text-light: #d0d0d0;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            /* IMAGE D'ARRIÈRE-PLAN GLOBAL */
            background-image: url('bg-main.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0a0a0a; /* Fallback */
            color: var(--text-light);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Superposition sombre pour lisibilité sur l'image de fond */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 30px;
            background: rgba(21, 21, 21, 0.9); /* Légère transparence */
            border: 1px solid var(--border);
            box-shadow: 0 0 50px rgba(0,0,0,1);
            position: relative;
            z-index: 2; /* Au-dessus de la superposition body::before */
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 {
            font-size: 2.5rem;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 15px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 40px;
            text-shadow: 3px 3px 0px #000;
        }

        /* Dossier Confidentiel avec IMAGE */
        #role-display {
            background: var(--paper);
            color: var(--text-dark);
            padding: 0; /* On enlève le padding pour l'image */
            margin: 20px 0;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.7);
            transform: rotate(-1deg);
            border-left: 15px solid #c5b595;
            display: none;
            overflow: hidden; /* Pour l'image arrondie */
            border-radius: 5px;
        }

        .role-image-container {
            width: 100%;
            height: 200px; /* Hauteur de l'illustration */
            background-size: cover;
            background-position: center;
            border-bottom: 2px solid #333;
        }

        .role-data {
            padding: 20px;
        }

        .stamp {
            border: 4px solid #7a1a1a;
            color: #7a1a1a;
            padding: 8px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 1.4rem;
            display: inline-block;
            transform: rotate(-10deg);
            margin-top: 15px;
            opacity: 0.9;
        }

        /* Inputs & Buttons - Légère transparence pour style */
        input {
            width: 85%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border);
            color: var(--red);
            font-family: inherit;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: #999;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        button:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.08); }

        .btn-main { background: rgba(26, 0, 0, 0.8); color: var(--red); border: 1px solid var(--red); }
        .btn-main:hover { background: rgba(255, 49, 49, 0.15); border-color: var(--red); color: #fff; }

        /* Timer & Jauge */
        .progress-container { width: 100%; height: 5px; background: #111; margin-top: 20px; border-radius: 2px; }
        #progress-bar { width: 100%; height: 100%; background: var(--red); transition: width 1s linear; box-shadow: 0 0 10px var(--red); border-radius: 2px; }
        #big-timer { font-size: 5rem; font-weight: bold; color: #fff; margin: 10px 0; text-shadow: 0 0 15px rgba(255,255,255,0.3); }

        /* Liste des joueurs */
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .player-card {
            padding: 18px; border: 1px solid var(--border); background: rgba(0, 0, 0, 0.5);
            cursor: pointer; transition: 0.3s; font-size: 0.95rem; font-weight: bold;
        }
        .player-card.dead { opacity: 0.2; text-decoration: line-through; filter: grayscale(1); pointer-events: none; }

        /* Ambiance */
        .hidden { display: none !important; }
        .sky-icon { font-size: 3rem; margin-bottom: 10px; opacity: 0.6; }
        
        /* IMAGE D'ARRIÈRE-PLAN NUIT */
        .night-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bg-night.jpg');
            background-size: cover;
            background-position: center;
            background-color: #000; /* Fallback */
            z-index: 1000;
        }
    </style>
</head>
<body>

<audio id="bg-music" loop><source src="ambiance.mp3" type="audio/mpeg"></audio>

<div class="container" id="game-ui">
    <h1>LE MAFIEUX</h1>

    <div id="setup-screen">
        <div id="player-inputs">
            <input type="text" placeholder="NOM DU SUSPECT" class="player-name">
            <input type="text" placeholder="NOM DU SUSPECT" class="player-name">
            <input type="text" placeholder="NOM DU SUSPECT" class="player-name">
        </div>
        <button onclick="addInput()">+ AJOUTER DOSSIER</button>
        <button class="btn-main" onclick="startGame(true)">DÉBUTER L'ENQUÊTE</button>
    </div>

    <div id="reveal-screen" class="hidden">
        <p style="letter-spacing: 5px; color: #777; font-size: 0.8rem; margin-top: 0;">RESTREINT // CLASSIFIÉ</p>
        <h2 id="target-name" style="color: #fff; font-size: 2.2rem; margin: 15px 0;">---</h2>
        <button id="show-btn" class="btn-main" onclick="showRole()">OUVRIR DOSSIER</button>
        
        <div id="role-display">
            <div id="role-image" class="role-image-container"></div>
            <div class="role-data">
                <p style="margin: 0; font-size: 0.8rem; text-align: left; opacity: 0.7; color: var(--text-dark);">DOSSIER RÉF: #NK-9920</p>
                <hr style="border: 0; border-top: 1px solid #999; margin: 10px 0;">
                <div id="role-text" class="stamp">---</div>
                <button onclick="nextStep()" style="margin-top: 25px; border-color: #888; color: #666; background: rgba(0,0,0,0.05);">RELIRE & FERMER</button>
            </div>
        </div>
    </div>

    <div id="master-screen" class="hidden">
        <div id="sky-anim" class="sky-icon">☀️</div>
        <div id="big-timer">05:00</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <div class="player-grid" id="elimination-list"></div>
        <button onclick="addMinute()" style="font-size: 0.75rem; border-style: dashed; margin-top: 25px; color: var(--gold); border-color: var(--gold);">+ 1 MINUTE (REQUÊTE)</button>
    </div>
</div>

<div id="night-overlay" class="night-overlay hidden"></div>

<script>
    let players = [];
    let currentIndex = 0;
    let timeLeft = 300;
    let timerInterval = null;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const music = document.getElementById('bg-music');

    function speak(text) {
        return new Promise(resolve => {
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'fr-FR'; s.pitch = 0.5; s.rate = 0.8;
            window.speechSynthesis.speak(s);
            setTimeout(resolve, text.length * 100 + 1500);
        });
    }

    function playTone(f, d, gVal = 0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        let o = audioCtx.createOscillator(); let g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = f; g.gain.setValueAtTime(gVal, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    function addInput() {
        const input = document.createElement('input');
        input.type = 'text'; input.placeholder = 'NOM DU SUSPECT'; input.className = 'player-name';
        document.getElementById('player-inputs').appendChild(input);
        playTone(150, 0.2);
    }

    async function startGame(first = false) {
        if (first) {
            const names = Array.from(document.querySelectorAll('.player-name')).map(i => i.value.trim()).filter(n => n !== "");
            if (names.length < 3) return alert("3 suspects minimum.");
            window.playerPool = names;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            music.play().catch(() => {});
        }

        let mCount = Math.max(1, Math.floor(window.playerPool.length / 3));
        let roles = [];
        for(let i=0; i<mCount; i++) roles.push({n:'MAFIEUX', t:'mafia'});
        while(roles.length < window.playerPool.length) roles.push({n:'POLICE', t:'police'});
        roles.sort(() => Math.random() - 0.5);

        players = window.playerPool.map((name, i) => ({ name, role: roles[i], alive: true }));
        currentIndex = 0; timeLeft = 300;

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('master-screen').classList.add('hidden');
        document.getElementById('reveal-screen').classList.remove('hidden');
        updateReveal();
    }

    function updateReveal() {
        document.getElementById('target-name').innerText = players[currentIndex].name;
        document.getElementById('role-display').style.display = 'none';
        document.getElementById('show-btn').classList.remove('hidden');
        document.body.style.boxShadow = "none"; // Reset effet couleur
    }

    function showRole() {
        const r = players[currentIndex].role;
        const imgContainer = document.getElementById('role-image');
        document.getElementById('role-text').innerText = r.n;
        
        // ATTRIBUTION DE L'IMAGE CORRESPONDANTE
        if(r.t === 'mafia') {
            imgContainer.style.backgroundImage = "url('role-mafia.jpg')";
            document.body.style.boxShadow = "inset 0 0 100px rgba(255, 49, 49, 0.4)"; // Halo rouge
        } else {
            imgContainer.style.backgroundImage = "url('role-police.jpg')";
            document.body.style.boxShadow = "inset 0 0 100px rgba(0, 210, 255, 0.3)"; // Halo bleu
        }
        
        document.getElementById('role-display').style.display = 'block';
        document.getElementById('show-btn').classList.add('hidden');
        playTone(300, 0.4);
    }

    function nextStep() {
        currentIndex++;
        if (currentIndex < players.length) updateReveal();
        else startMasterMode();
    }

    async function startMasterMode() {
        document.getElementById('reveal-screen').classList.add('hidden');
        document.getElementById('master-screen').classList.remove('hidden');
        document.getElementById('night-overlay').classList.remove('hidden');
        document.getElementById('sky-anim').innerText = "🌙";

        await speak("L'enquête commence. Posez le téléphone. Fermez les yeux.");
        await new Promise(r => setTimeout(r, 2000));
        await speak("Mafieux, réveillez-vous et reconnaissez-vous.");
        await new Promise(r => setTimeout(r, 8000));
        await speak("Mafieux, rendormez-vous.");

        document.getElementById('night-overlay').classList.add('hidden');
        document.getElementById('sky-anim').innerText = "☀️";
        await speak("Le jour se lève. Interrogez les suspects.");
        renderPlayers(); startTimer();
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('big-timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            document.getElementById('progress-bar').style.width = (timeLeft / 300) * 100 + "%";
            
            if (timeLeft <= 0) { clearInterval(timerInterval); speak("Le temps est écoulé. Votez."); }
            timeLeft--;
        }, 1000);
    }

    function addMinute() { timeLeft += 60; playTone(400, 0.3); startTimer(); }

    function renderPlayers() {
        const list = document.getElementById('elimination-list');
        list.innerHTML = "";
        players.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = `player-card ${p.alive ? '' : 'dead'}`;
            card.innerText = p.name;
            card.onclick = () => eliminate(i);
            list.appendChild(card);
        });
    }

    async function eliminate(i) {
        if(!players[i].alive) return;
        players[i].alive = false; renderPlayers();
        playTone(100, 0.8);
        await speak(players[i].name + " était " + players[i].role.n);
        const aliveMafia = players.filter(pl => pl.alive && pl.role.t === 'mafia').length;
        if(aliveMafia === 0) { await speak("La ville est nettoyée. La police gagne."); location.reload(); }
    }
</script>
</body>
</html>
