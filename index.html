<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="icon.jpg">
    <link rel="apple-touch-icon" href="icon.jpg">    
    <title>EL MAFIOSO</title>
    <style>
        :root {
            --red: #ff3131; --blue: #00d2ff; --purple: #bc13fe;
            --gold: #ffcf1b; --border: #333; --paper: #e8dcc4;
            --text-dark: #1a1a1a; --text-light: #d0d0d0;
        }

        /* FOND ET CENTRAGE */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0a0a0a;
            background-image: url('bg-main.png');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            color: var(--text-light);
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); z-index: 1;
        }

        .container {
            width: 85%; max-width: 380px; padding: 25px;
            background: rgba(21, 21, 21, 0.95); border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(0,0,0,1); position: relative; z-index: 2;
            border-radius: 12px; text-align: center;
        }

        h1 { font-size: 1.8rem; color: var(--red); letter-spacing: 8px; margin-bottom: 20px; text-align: center; }

        input {
            width: 90%; padding: 12px; background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border); color: var(--red);
            margin-bottom: 8px; border-radius: 4px; text-align: center; font-family: inherit;
        }

        button {
            width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border); color: #bbb;
            text-transform: uppercase; cursor: pointer; border-radius: 4px; font-family: inherit;
        }

        .btn-main { background: rgba(120, 0, 0, 0.8); color: white; border: 1px solid var(--red); font-weight: bold; }

        /* TIMER ET CARTES */
        #big-timer { font-size: 4rem; color: #fff; margin: 10px 0; font-family: monospace; }
        .progress-container { width: 100%; height: 6px; background: #111; margin: 10px 0; }
        #progress-bar { width: 100%; height: 100%; background: var(--red); transition: width 1s linear; }

        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .player-card { padding: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.6); font-size: 0.8rem; font-weight: bold; }
        .player-card.dead { opacity: 0.2; text-decoration: line-through; pointer-events: none; }

        /* DOSSIER ROLE */
        #role-display {
            background: var(--paper); color: var(--text-dark); padding: 0;
            margin: 15px 0; box-shadow: 5px 5px 20px rgba(0,0,0,0.7);
            border-left: 10px solid #c5b595; border-radius: 5px; overflow: hidden;
        }
        .role-image-container { width: 100%; height: 150px; background-size: cover; background-position: center; border-bottom: 1px solid #333; }
        .role-data { padding: 15px; }
        .stamp { border: 3px solid #7a1a1a; color: #7a1a1a; padding: 5px 10px; font-weight: bold; font-size: 1.2rem; transform: rotate(-10deg); display: inline-block; margin: 10px 0; }

        .hidden { display: none !important; }

        /* OVERLAYS */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center;
        }
        .night-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg-night.jpg') no-repeat center center;
            background-size: cover; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="start-overlay">
    <button class="btn-main" style="width: auto; padding: 20px 40px;" onclick="initAudio()">ACCÉDER AU COMMISSARIAT</button>
</div>

<audio id="bg-music" loop><source src="ambiance.mp3" type="audio/mpeg"></audio>

<div class="container hidden" id="game-ui">
    <h1>EL MAFIOSO</h1>

    <div id="setup-screen">
        <div id="player-inputs">
            <input type="text" placeholder="NOM DU SUSPECT" class="player-name">
            <input type="text" placeholder="NOM DU SUSPECT" class="player-name">
            <input type="text" placeholder="NOM DU SUSPECT" class="player-name">
        </div>
        <button onclick="addInput()">+ AJOUTER UN JOUEUR</button>
        <button class="btn-main" onclick="startGame()" style="margin-top:20px">LANCER LA PARTIE</button>
    </div>

    <div id="reveal-screen" class="hidden">
        <h2 id="target-name">---</h2>
        <button id="show-btn" class="btn-main" onclick="showRole()">OUVRIR DOSSIER</button>
        <div id="role-display" class="hidden">
            <div id="role-image" class="role-image-container"></div>
            <div class="role-data">
                <div id="role-text" class="stamp">---</div>
                <button onclick="nextStep()" style="color:#333; border-color:#333; margin-top:10px">FERMER</button>
            </div>
        </div>
    </div>

    <div id="master-screen" class="hidden">
        <div id="big-timer">05:00</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div class="player-grid" id="elimination-list"></div>
        <button onclick="addMinute()" style="color:var(--gold); margin-top:20px">+ 1 MINUTE</button>
    </div>
</div>

<div id="night-overlay" class="night-overlay hidden"></div>

<script>
    let players = [];
    let currentIndex = 0;
    let timeLeft = 300;
    let timerInterval = null;
    const music = document.getElementById('bg-music');

    const audioFiles = {
        debut: 'voix-debut.mp3', nuit: 'voix-nuit.mp3', mafiaReveil: 'voix-mafia-reveil.mp3',
        mafiaDodo: 'voix-mafia-dodo.mp3', underReveil: 'voix-under-reveil.mp3',
        jour: 'voix-jour.mp3', soixante: 'voix-60s.mp3', vote: 'voix-chrono-fin.mp3'
    };

    function initAudio() {
        music.volume = 0.2;
        music.play().catch(e => console.log("Audio play blocked"));
        document.getElementById('start-overlay').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
    }

    // FONCTION VOIX OPTIMISÉE (PAUSE LA MUSIQUE POUR ÊTRE SÛR)
    function playVoice(key) {
        return new Promise(resolve => {
            if (!audioFiles[key]) return resolve();
            
            music.pause(); // Stop l'ambiance pour laisser place à la voix
            const audio = new Audio(audioFiles[key]);
            
            // Sécurité : si le son bug, on débloque après 10s
            const safety = setTimeout(() => { music.play(); resolve(); }, 10000);

            audio.play().then(() => {
                audio.onended = () => {
                    clearTimeout(safety);
                    music.play(); // Reprend l'ambiance
                    resolve();
                };
            }).catch(e => {
                console.log("Erreur voix: " + key);
                clearTimeout(safety);
                music.play();
                resolve();
            });
        });
    }

    async function speakRobot(text) {
        music.pause();
        const s = new SpeechSynthesisUtterance(text);
        s.lang = 'fr-FR'; s.rate = 0.85;
        window.speechSynthesis.speak(s);
        s.onend = () => music.play();
    }

    function addInput() {
        const input = document.createElement('input');
        input.type = 'text'; input.placeholder = 'NOM DU SUSPECT'; input.className = 'player-name';
        document.getElementById('player-inputs').appendChild(input);
    }

    function startGame() {
        const names = Array.from(document.querySelectorAll('.player-name')).map(i => i.value.trim()).filter(n => n !== "");
        if (names.length < 3) return alert("3 joueurs min.");
        
        let roles = [];
        let total = names.length;
        let mCount = Math.max(1, Math.floor(total/3));
        for(let i=0; i<mCount; i++) roles.push({n:'MAFIEUX', t:'mafia'});
        if(total >= 6) roles.push({n:'INFILTRÉ', t:'undercover'});
        while(roles.length < total) roles.push({n:'POLICE', t:'police'});
        roles.sort(() => Math.random() - 0.5);

        players = names.map((name, i) => ({ name, role: roles[i], alive: true }));
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('reveal-screen').classList.remove('hidden');
        updateReveal();
    }

    function updateReveal() {
        document.getElementById('target-name').innerText = players[currentIndex].name;
        document.getElementById('role-display').classList.add('hidden');
        document.getElementById('show-btn').classList.remove('hidden');
        document.body.style.boxShadow = "none";
    }

    function showRole() {
        const r = players[currentIndex].role;
        const img = document.getElementById('role-image');
        document.getElementById('role-text').innerText = r.n;
        img.style.backgroundImage = `url('role-${r.t}.png')`;
        
        // Halo de couleur immersif
        if(r.t === 'mafia') document.body.style.boxShadow = "inset 0 0 100px rgba(255, 49, 49, 0.4)";
        else if(r.t === 'undercover') document.body.style.boxShadow = "inset 0 0 100px rgba(188, 19, 254, 0.3)";
        else document.body.style.boxShadow = "inset 0 0 100px rgba(0, 210, 255, 0.3)";

        document.getElementById('role-display').classList.remove('hidden');
        document.getElementById('show-btn').classList.add('hidden');
    }

    function nextStep() {
        currentIndex++;
        if (currentIndex < players.length) updateReveal();
        else startMasterMode();
    }

    async function startMasterMode() {
        document.getElementById('reveal-screen').classList.add('hidden');
        document.getElementById('master-screen').classList.remove('hidden');
        const night = document.getElementById('night-overlay');
        night.classList.remove('hidden');
        
        await playVoice('debut');
        await playVoice('nuit');
        await new Promise(r => setTimeout(r, 1500));
        await playVoice('mafiaReveil');
        await new Promise(r => setTimeout(r, 8000));
        await playVoice('mafiaDodo');

        if(players.some(p => p.role.t === 'undercover')) {
            await new Promise(r => setTimeout(r, 1500));
            await playVoice('underReveil');
            await new Promise(r => setTimeout(r, 7000));
        }

        night.classList.add('hidden');
        await playVoice('jour');
        renderPlayers();
        startTimer();
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('big-timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            document.getElementById('progress-bar').style.width = (timeLeft / 300) * 100 + "%";
            if (timeLeft === 60) playVoice('soixante');
            if (timeLeft <= 0) { clearInterval(timerInterval); playVoice('vote'); }
        }, 1000);
    }

    function renderPlayers() {
        const list = document.getElementById('elimination-list');
        list.innerHTML = "";
        players.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = `player-card ${p.alive ? '' : 'dead'}`;
            card.innerText = p.name;
            card.onclick = () => eliminate(i);
            list.appendChild(card);
        });
    }

    function addMinute() { timeLeft += 60; }

    async function eliminate(i) {
        if(!players[i].alive) return;
        players[i].alive = false;
        renderPlayers();
        await speakRobot(players[i].name + " était " + players[i].role.n);
        if(players.filter(p => p.alive && p.role.t === 'mafia').length === 0) {
            alert("LA POLICE GAGNE !");
            location.reload();
        }
    }
</script>
</body>
</html>
