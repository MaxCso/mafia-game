<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA - Direct Vote Edition</title>
    <style>
        :root { --red: #ff3131; --blue: #00d2ff; --gold: #ffcf1b; --bg: #050505; --card: #111; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #e0e0e0; text-align: center; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 400px; width: 90%; padding: 25px; border-radius: 24px; background: var(--card); border: 1px solid #222; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        .scoreboard { display: flex; justify-content: space-around; background: #000; padding: 10px; border-radius: 50px; margin-bottom: 20px; border: 1px solid #333; font-size: 0.8rem; }
        .score-item span { display: block; font-weight: bold; font-size: 1.1rem; }

        h1 { font-size: 2rem; color: var(--red); text-transform: uppercase; letter-spacing: 8px; margin-bottom: 20px; }
        
        input { width: 85%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; margin-bottom: 10px; font-family: inherit; }
        button { font-family: inherit; text-transform: uppercase; font-weight: bold; cursor: pointer; border-radius: 12px; border: none; transition: 0.3s; }
        
        .btn-main { background: var(--red); color: white; padding: 18px; width: 100%; font-size: 1rem; margin-top: 10px; box-shadow: 0 4px 15px rgba(255, 49, 49, 0.2); }
        .btn-sec { background: #222; color: #888; padding: 10px; width: 100%; margin-top: 10px; font-size: 0.8rem; }
        
        #elimination-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .player-card { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; cursor: pointer; }
        .player-card.dead { opacity: 0.2; text-decoration: line-through; pointer-events: none; }

        .role-box { margin: 20px 0; padding: 40px 10px; border-radius: 15px; background: #000; border: 2px solid #222; font-size: 1.8rem; }
        .mafia { color: var(--red); border-color: var(--red); }
        .police { color: var(--blue); border-color: var(--blue); }

        #big-timer { font-size: 5rem; color: var(--gold); font-weight: 900; margin: 10px 0; }
        .hidden { display: none !important; }
        .night-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <div class="scoreboard hidden" id="scoreboard">
        <div class="score-item" style="color: var(--blue)">POLICE <span id="score-police">0</span></div>
        <div class="score-item">MANCHE <span id="current-round">1</span></div>
        <div class="score-item" style="color: var(--red)">MAFIA <span id="score-mafia">0</span></div>
    </div>

    <h1 id="title">MAFIA</h1>

    <div id="setup-screen">
        <div id="player-inputs">
            <input type="text" placeholder="JOUEUR 1" class="player-name">
            <input type="text" placeholder="JOUEUR 2" class="player-name">
            <input type="text" placeholder="JOUEUR 3" class="player-name">
        </div>
        <button onclick="addInput()" class="btn-sec">+ JOUEUR</button>
        <button class="btn-main" onclick="startGame(true)">DÉMARRER LE TOURNOI</button>
    </div>

    <div id="reveal-screen" class="hidden">
        <h2 id="target-name">---</h2>
        <button id="show-btn" class="btn-main" onclick="showRole()">VOIR MON RÔLE</button>
        <div id="role-result" class="hidden">
            <div id="role-card" class="role-box"><span id="role-text">---</span></div>
            <button class="btn-main" onclick="nextStep()" style="background: #222;">SUIVANT</button>
        </div>
    </div>

    <div id="master-screen" class="hidden">
        <div id="big-timer">05:00</div>
        <button id="add-time-btn" onclick="addMinute()" style="background: #333; color: var(--gold); padding: 8px 15px; font-size: 0.7rem; border-radius: 50px; margin-bottom: 10px;">+ 1 MINUTE</button>
        
        <p id="instruction-text" style="font-size: 0.8rem; color: #555;">DÉBAT EN COURS... CLIQUEZ SUR LE NOM DE L'ÉLIMINÉ APRÈS LE VOTE.</p>
        
        <div id="elimination-list"></div>
        <button onclick="location.reload()" style="background:none; color:#222; margin-top:30px; border:none; text-decoration:underline; font-size:0.6rem;">Réinitialiser tout</button>
    </div>
</div>

<div id="night-overlay" class="night-overlay hidden"></div>

<script>
    let players = [];
    let currentIndex = 0;
    let scores = { police: 0, mafia: 0, round: 1 };
    let timeLeft = 300;
    let timerInterval = null;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function speak(text) {
        return new Promise(resolve => {
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'fr-FR'; s.pitch = 0.6; s.rate = 0.8;
            const v = window.speechSynthesis.getVoices();
            s.voice = v.find(voice => voice.lang.startsWith('fr')) || null;
            s.onend = resolve;
            window.speechSynthesis.speak(s);
            setTimeout(resolve, text.length * 80 + 1200);
        });
    }

    function playTone(f, d, gVal = 0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        let o = audioCtx.createOscillator(); let g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = f; g.gain.setValueAtTime(gVal, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    function addInput() {
        const input = document.createElement('input');
        input.type = 'text'; input.placeholder = 'NOM'; input.className = 'player-name';
        document.getElementById('player-inputs').appendChild(input);
    }

    async function startGame(first = false) {
        if (first) {
            const names = Array.from(document.querySelectorAll('.player-name')).map(i => i.value.trim().toUpperCase()).filter(n => n !== "");
            if (names.length < 3) return alert("3 JOUEURS MINIMUM");
            window.playerPool = names;
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        let names = window.playerPool;
        let mCount = Math.max(1, Math.floor(names.length / 3));
        let roles = [];
        for(let i=0; i<mCount; i++) roles.push({n:'MAFIEUX', t:'mafia'});
        while(roles.length < names.length) roles.push({n:'POLICIER', t:'police'});
        roles.sort(() => Math.random() - 0.5);

        players = names.map((name, i) => ({ name, role: roles[i], alive: true }));
        currentIndex = 0;
        timeLeft = 300;

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('master-screen').classList.add('hidden');
        document.getElementById('scoreboard').classList.remove('hidden');
        document.getElementById('reveal-screen').classList.remove('hidden');
        updateReveal();
    }

    function updateReveal() {
        document.getElementById('target-name').innerText = players[currentIndex].name;
        document.getElementById('role-result').classList.add('hidden');
        document.getElementById('show-btn').classList.remove('hidden');
    }

    function showRole() {
        const r = players[currentIndex].role;
        document.getElementById('role-text').innerText = r.n;
        document.getElementById('role-card').className = "role-box " + r.t;
        document.getElementById('role-result').classList.remove('hidden');
        document.getElementById('show-btn').classList.add('hidden');
        if (navigator.vibrate) r.t === 'mafia' ? navigator.vibrate([150, 100, 150]) : navigator.vibrate(50);
        playTone(300, 0.4);
    }

    function nextStep() {
        currentIndex++;
        if (currentIndex < players.length) updateReveal();
        else startMasterMode();
    }

    async function startMasterMode() {
        document.getElementById('reveal-screen').classList.add('hidden');
        document.getElementById('master-screen').classList.remove('hidden');
        document.getElementById('night-overlay').classList.remove('hidden');
        
        await speak("Manche " + scores.round + ". Posez le téléphone. Fermez les yeux.");
        let heart = setInterval(() => playTone(50, 0.8, 0.05), 1800);
        
        await new Promise(r => setTimeout(r, 2000));
        await speak("Mafieux... réveillez-vous et reconnaissez-vous.");
        await new Promise(r => setTimeout(r, 9000));
        await speak("Mafieux... rendormez-vous.");

        clearInterval(heart);
        document.getElementById('night-overlay').classList.add('hidden');
        await speak("Le soleil se lève ! Débat de cinq minutes.");
        renderEliminationList();
        startTimer();
    }

    function renderEliminationList() {
        const list = document.getElementById('elimination-list');
        list.innerHTML = "";
        players.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = `player-card ${p.alive ? '' : 'dead'}`;
            card.innerText = p.name;
            card.onclick = () => eliminate(index);
            list.appendChild(card);
        });
    }

    async function eliminate(index) {
        if (!players[index].alive) return;
        const p = players[index];
        p.alive = false;
        renderEliminationList();

        playTone(100, 1);
        await speak(p.name + " était... " + p.role.n);

        const aliveMafia = players.filter(pl => pl.alive && pl.role.t === 'mafia').length;
        const alivePolice = players.filter(pl => pl.alive && pl.role.t === 'police').length;

        if (aliveMafia === 0) {
            scores.police++;
            await speak("La police gagne la manche !");
            finishRound();
        } else if (aliveMafia >= alivePolice) {
            scores.mafia++;
            await speak("La mafia prend le contrôle !");
            finishRound();
        }
    }

    function finishRound() {
        scores.round++;
        document.getElementById('score-police').innerText = scores.police;
        document.getElementById('score-mafia').innerText = scores.mafia;
        document.getElementById('current-round').innerText = scores.round;
        clearInterval(timerInterval);
        setTimeout(() => startGame(false), 2000);
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        const display = document.getElementById('big-timer');
        timerInterval = setInterval(async () => {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            display.innerText = `${m}:${s < 10 ? '0' + s : s}`;
            
            if (timeLeft === 60) speak("Une minute restante.");
            if (timeLeft === 0) {
                clearInterval(timerInterval);
                playTone(200, 2);
                speak("Temps écoulé ! Tout le monde vote au signal. Trois. deux. un. Votez !");
            }
            timeLeft--;
        }, 1000);
    }

    function addMinute() {
        timeLeft += 60;
        playTone(400, 0.3);
        if(timeLeft > 0) startTimer();
    }

    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>
</body>
</html>
