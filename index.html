<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA - Dossier Noir</title>
    <style>
        :root {
            --red: #ff3131;
            --blue: #00d2ff;
            --gold: #ffcf1b;
            --bg: #0a0a0a;
            --card: #151515;
            --border: #2a2a2a;
            --paper: #e8dcc4; /* Couleur vieux papier pour le rôle */
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg);
            color: #d0d0d0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 30px;
            background: var(--card);
            border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(0,0,0,1);
            position: relative;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 {
            font-size: 2.2rem;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 15px;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 2px 2px 0px #000;
        }

        /* Dossier Confidentiel */
        #role-display {
            background: var(--paper);
            color: #1a1a1a;
            padding: 40px 20px;
            margin: 20px 0;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            transform: rotate(-1deg);
            border-left: 15px solid #c5b595;
            display: none;
        }

        .stamp {
            border: 4px solid #7a1a1a;
            color: #7a1a1a;
            padding: 10px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 1.5rem;
            display: inline-block;
            transform: rotate(-15deg);
            margin-top: 20px;
            opacity: 0.8;
        }

        /* Inputs & Buttons */
        input {
            width: 85%;
            padding: 15px;
            background: #000;
            border: 1px solid var(--border);
            color: var(--red);
            font-family: inherit;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 1px solid var(--border);
            color: #888;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        button:hover { color: var(--red); border-color: var(--red); background: rgba(255,49,49,0.05); }

        .btn-main { background: #1a0000; color: var(--red); border: 1px solid var(--red); }

        /* Timer & Jauge */
        .progress-container { width: 100%; height: 4px; background: #111; margin-top: 20px; }
        #progress-bar { width: 100%; height: 100%; background: var(--red); transition: width 1s linear; box-shadow: 0 0 10px var(--red); }
        #big-timer { font-size: 5rem; font-weight: bold; color: #eee; margin: 10px 0; }

        /* Liste des joueurs */
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .player-card {
            padding: 15px; border: 1px solid var(--border); background: #000;
            cursor: pointer; transition: 0.3s; font-size: 0.9rem;
        }
        .player-card.dead { opacity: 0.2; text-decoration: line-through; filter: grayscale(1); }

        /* Ambiance */
        .hidden { display: none !important; }
        .sky-icon { font-size: 3rem; margin-bottom: 10px; opacity: 0.5; }
        .night-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; }
    </style>
</head>
<body>

<audio id="bg-music" loop><source src="ambiance.mp3" type="audio/mpeg"></audio>

<div class="container" id="game-ui">
    <h1>MAFIA</h1>

    <div id="setup-screen">
        <div id="player-inputs">
            <input type="text" placeholder="NOM DU SUSPECT" class="player-name">
            <input type="text" placeholder="NOM DU SUSPECT" class="player-name">
            <input type="text" placeholder="NOM DU SUSPECT" class="player-name">
        </div>
        <button onclick="addInput()">+ AJOUTER DOSSIER</button>
        <button class="btn-main" onclick="startGame(true)">DÉBUTER L'ENQUÊTE</button>
    </div>

    <div id="reveal-screen" class="hidden">
        <p style="letter-spacing: 5px; color: #555;">RESTREINT</p>
        <h2 id="target-name" style="color: #fff; font-size: 2rem;">---</h2>
        <button id="show-btn" onclick="showRole()">OUVRIR DOSSIER</button>
        
        <div id="role-display">
            <p style="margin: 0; font-size: 0.8rem; text-align: left; opacity: 0.6;">CLASSIFIÉ TOP SECRET</p>
            <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">
            <div id="role-text" class="stamp">---</div>
            <button onclick="nextStep()" style="margin-top: 30px; border-color: #333; color: #333;">RELIRE & FERMER</button>
        </div>
    </div>

    <div id="master-screen" class="hidden">
        <div id="sky-anim" class="sky-icon">☀️</div>
        <div id="big-timer">05:00</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <div class="player-grid" id="elimination-list"></div>
        <button onclick="addMinute()" style="font-size: 0.7rem; border-style: dashed; margin-top: 20px;">+ 1 MINUTE</button>
    </div>
</div>

<div id="night-overlay" class="hidden"></div>

<script>
    let players = [];
    let currentIndex = 0;
    let timeLeft = 300;
    let timerInterval = null;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const music = document.getElementById('bg-music');

    function speak(text) {
        return new Promise(resolve => {
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'fr-FR'; s.pitch = 0.5; s.rate = 0.8;
            window.speechSynthesis.speak(s);
            setTimeout(resolve, text.length * 100 + 1500);
        });
    }

    function addInput() {
        const input = document.createElement('input');
        input.type = 'text'; input.placeholder = 'NOM DU SUSPECT'; input.className = 'player-name';
        document.getElementById('player-inputs').appendChild(input);
    }

    async function startGame(first = false) {
        if (first) {
            const names = Array.from(document.querySelectorAll('.player-name')).map(i => i.value.trim()).filter(n => n !== "");
            if (names.length < 3) return alert("3 suspects minimum.");
            window.playerPool = names;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            music.play().catch(() => {});
        }

        let mCount = Math.max(1, Math.floor(window.playerPool.length / 3));
        let roles = [];
        for(let i=0; i<mCount; i++) roles.push({n:'MAFIEUX', t:'mafia'});
        while(roles.length < window.playerPool.length) roles.push({n:'POLICE', t:'police'});
        roles.sort(() => Math.random() - 0.5);

        players = window.playerPool.map((name, i) => ({ name, role: roles[i], alive: true }));
        currentIndex = 0; timeLeft = 300;

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('master-screen').classList.add('hidden');
        document.getElementById('reveal-screen').classList.remove('hidden');
        updateReveal();
    }

    function updateReveal() {
        document.getElementById('target-name').innerText = players[currentIndex].name;
        document.getElementById('role-display').style.display = 'none';
        document.getElementById('show-btn').classList.remove('hidden');
        document.body.style.background = "var(--bg)";
    }

    function showRole() {
        const r = players[currentIndex].role;
        document.getElementById('role-text').innerText = r.n;
        document.getElementById('role-display').style.display = 'block';
        document.getElementById('show-btn').classList.add('hidden');
        
        // Effet de baignade de couleur discret
        document.body.style.background = (r.t === 'mafia') ? "#1a0505" : "#050d1a";
    }

    function nextStep() {
        currentIndex++;
        if (currentIndex < players.length) updateReveal();
        else startMasterMode();
    }

    async function startMasterMode() {
        document.getElementById('reveal-screen').classList.add('hidden');
        document.getElementById('master-screen').classList.remove('hidden');
        document.getElementById('night-overlay').classList.remove('hidden');
        document.getElementById('sky-anim').innerText = "🌙";

        await speak("L'enquête commence. Posez le téléphone. Fermez les yeux.");
        await new Promise(r => setTimeout(r, 2000));
        await speak("Mafieux, réveillez-vous et reconnaissez-vous.");
        await new Promise(r => setTimeout(r, 8000));
        await speak("Mafieux, rendormez-vous.");

        document.getElementById('night-overlay').classList.add('hidden');
        document.getElementById('sky-anim').innerText = "☀️";
        await speak("Le jour se lève. Les suspects sont à vous.");
        renderPlayers(); startTimer();
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('big-timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            document.getElementById('progress-bar').style.width = (timeLeft / 300) * 100 + "%";
            
            if (timeLeft <= 0) { clearInterval(timerInterval); speak("Le temps est écoulé. Votez."); }
            timeLeft--;
        }, 1000);
    }

    function addMinute() { timeLeft += 60; startTimer(); }

    function renderPlayers() {
        const list = document.getElementById('elimination-list');
        list.innerHTML = "";
        players.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = `player-card ${p.alive ? '' : 'dead'}`;
            card.innerText = p.name;
            card.onclick = () => eliminate(i);
            list.appendChild(card);
        });
    }

    async function eliminate(i) {
        if(!players[i].alive) return;
        players[i].alive = false; renderPlayers();
        await speak(players[i].name + " était " + players[i].role.n);
        const aliveMafia = players.filter(pl => pl.alive && pl.role.t === 'mafia').length;
        if(aliveMafia === 0) { await speak("La police a nettoyé la ville."); location.reload(); }
    }
</script>
</body>
</html>
