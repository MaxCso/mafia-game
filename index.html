<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA - Immersion Sonore</title>
    <style>
        :root { --red: #ff3131; --blue: #00d2ff; --purple: #bc13fe; --gold: #ffcf1b; --bg: #050505; }
        body { font-family: 'Courier New', Courier, monospace; background: var(--bg); color: #e0e0e0; text-align: center; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 400px; width: 90%; padding: 30px; border-radius: 24px; background: #111; border: 1px solid #222; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        h1 { font-size: 2.5rem; color: var(--red); text-transform: uppercase; letter-spacing: 12px; margin-bottom: 40px; text-shadow: 0 0 20px rgba(255, 49, 49, 0.4); }
        .input-group { margin-bottom: 15px; }
        input { width: 85%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; font-family: inherit; }
        button { font-family: inherit; text-transform: uppercase; font-weight: bold; cursor: pointer; border-radius: 12px; border: none; transition: 0.3s; }
        .btn-add { background: transparent; color: #666; border: 1px dashed #444; width: 100%; padding: 12px; margin-bottom: 20px; }
        .btn-main { background: var(--red); color: white; padding: 20px; width: 100%; font-size: 1.1rem; }
        .role-box { margin: 30px 0; padding: 60px 20px; border-radius: 20px; background: #000; border: 2px solid #222; font-size: 2rem; }
        .mafia { color: var(--red); border-color: var(--red); }
        .police { color: var(--blue); border-color: var(--blue); }
        .undercover { color: var(--purple); border-color: var(--purple); }
        #big-timer { font-size: 5rem; color: var(--gold); font-weight: 900; margin: 20px 0; }
        .hidden { display: none; }
        #night-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #night-names-display { color: #500; font-size: 1.1rem; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>MAFIA</h1>

    <div id="setup-screen">
        <div id="player-list">
            <div class="input-group"><input type="text" placeholder="JOUEUR 1" class="player-name"></div>
            <div class="input-group"><input type="text" placeholder="JOUEUR 2" class="player-name"></div>
            <div class="input-group"><input type="text" placeholder="JOUEUR 3" class="player-name"></div>
        </div>
        <button onclick="addPlayer()" class="btn-add">+ AJOUTER JOUEUR</button>
        <button class="btn-main" onclick="initGame()">LANCER LA PARTIE</button>
    </div>

    <div id="reveal-screen" class="hidden">
        <h2 id="target-name" style="font-size: 2.2rem; margin: 20px 0;">---</h2>
        <button id="show-btn" class="btn-main" onclick="showRole()">OUVRIR DOSSIER</button>
        <div id="role-result" class="hidden">
            <div id="role-card" class="role-box"><span id="role-text">---</span></div>
            <button class="btn-main" onclick="nextStep()" style="background: #222;">JOUEUR SUIVANT</button>
        </div>
    </div>

    <div id="master-screen" class="hidden">
        <div class="role-box" style="border-style: dashed; font-size: 1.2rem;">POSEZ LE TÉLÉPHONE.</div>
        <div id="big-timer" class="hidden">05:00</div>
        <button class="btn-main hidden" id="defense-btn" onclick="startDefense()" style="background: var(--gold); color: #000;">🎤 DERNIÈRE PAROLE</button>
    </div>
</div>

<div id="night-overlay" class="hidden">
    <div id="night-instruction" style="color: #333; font-style: italic;">Silence...</div>
    <div id="night-names-display" class="hidden"></div>
</div>

<script>
    let players = [];
    let currentIndex = 0;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let ambientOsc = null;

    // --- GENERATEUR DE SONS AMBIANTS ---
    function startAmbientNoise(type = 'night') {
        ambientOsc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        ambientOsc.connect(gain); gain.connect(audioCtx.destination);
        ambientOsc.type = 'triangle';
        ambientOsc.frequency.setValueAtTime(type === 'night' ? 40 : 60, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        ambientOsc.start();
    }

    function stopAmbientNoise() {
        if(ambientOsc) { ambientOsc.stop(); ambientOsc = null; }
    }

    function playTone(f, d, gVal = 0.1, type='sine') {
        let o = audioCtx.createOscillator(); let g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = type; o.frequency.value = f;
        g.gain.setValueAtTime(gVal, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    function speak(text) {
        return new Promise(resolve => {
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'fr-FR'; speech.pitch = 0.6; speech.rate = 0.75;
            const voices = window.speechSynthesis.getVoices();
            const frVoice = voices.find(v => v.lang.startsWith('fr'));
            if (frVoice) speech.voice = frVoice;
            speech.onend = resolve;
            window.speechSynthesis.speak(speech);
        });
    }

    // --- LOGIQUE ---
    function addPlayer() {
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `<input type="text" placeholder="JOUEUR" class="player-name">`;
        document.getElementById('player-list').appendChild(div);
    }

    function initGame() {
        const names = Array.from(document.querySelectorAll('.player-name')).map(i => i.value.trim().toUpperCase()).filter(n => n !== "");
        if (names.length < 3) return alert("3 JOUEURS MINIMUM");
        let m = Math.max(1, Math.floor(names.length / 3));
        let u = names.length >= 6 ? 1 : 0;
        let roles = [];
        for(let i=0; i<m; i++) roles.push({n:'MAFIEUX', t:'mafia'});
        for(let i=0; i<u; i++) roles.push({n:'INFILTRÉ', t:'undercover'});
        while(roles.length < names.length) roles.push({n:'POLICIER', t:'police'});
        roles.sort(() => Math.random() - 0.5);
        players = names.map((name, i) => ({ name, role: roles[i] }));
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('reveal-screen').classList.remove('hidden');
        updateReveal();
    }

    function updateReveal() {
        document.getElementById('target-name').innerText = players[currentIndex].name;
        document.getElementById('role-result').classList.add('hidden');
        document.getElementById('show-btn').classList.remove('hidden');
    }

    function showRole() {
        const r = players[currentIndex].role;
        document.getElementById('role-text').innerText = r.n;
        document.getElementById('role-card').className = "role-box " + r.t;
        document.getElementById('role-result').classList.remove('hidden');
        document.getElementById('show-btn').classList.add('hidden');
        if (navigator.vibrate) r.t === 'mafia' ? navigator.vibrate([150, 100, 150]) : (r.t === 'undercover' ? navigator.vibrate(600) : navigator.vibrate(50));
        playTone(200, 0.5);
    }

    function nextStep() {
        currentIndex++;
        if (currentIndex < players.length) updateReveal();
        else startMasterMode();
    }

    async function startMasterMode() {
        document.getElementById('reveal-screen').classList.add('hidden');
        document.getElementById('master-screen').classList.remove('hidden');
        document.getElementById('night-overlay').classList.remove('hidden');
        const mafieuxNames = players.filter(p => p.role.t === 'mafia').map(p => p.name).join(' & ');

        await speak("Posez le téléphone. La nuit tombe.");
        startAmbientNoise('night');
        await speak("Fermez tous les yeux.");
        
        let heart = setInterval(() => playTone(50, 1.2, 0.15), 2000);

        await new Promise(r => setTimeout(r, 2000));
        await speak("Mafieux... réveillez-vous. Regardez-vous discrètement.");
        const display = document.getElementById('night-names-display');
        display.innerText = "Complices : " + mafieuxNames;
        display.classList.remove('hidden');
        await new Promise(r => setTimeout(r, 10000));
        display.classList.add('hidden');
        await speak("Mafieux... rendormez-vous.");

        if(players.some(p => p.role.t === 'undercover')) {
            await new Promise(r => setTimeout(r, 3000));
            await speak("Infiltré... réveille-toi. Identifie tes cibles.");
            display.innerText = "Mafieux : " + mafieuxNames;
            display.classList.remove('hidden');
            await new Promise(r => setTimeout(r, 7000));
            display.classList.add('hidden');
            await speak("Infiltré... rendors-toi.");
        }

        clearInterval(heart);
        stopAmbientNoise();
        document.getElementById('night-overlay').classList.add('hidden');
        await speak("Le soleil se lève ! Tout le monde se réveille. Le débat commence.");
        startDebateTimer();
    }

    function startDebateTimer() {
        let time = 300; 
        const display = document.getElementById('big-timer');
        display.classList.remove('hidden');
        startAmbientNoise('debate');
        const timer = setInterval(() => {
            let m = Math.floor(time / 60), s = time % 60;
            display.innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(time === 60) speak("Une minute.");
            if(time === 0) {
                clearInterval(timer);
                stopAmbientNoise();
                speak("Temps écoulé !");
                document.getElementById('defense-btn').classList.remove('hidden');
            }
            time--;
        }, 1000);
    }

    async function startDefense() {
        document.getElementById('defense-btn').disabled = true;
        playTone(100, 1.5, 0.4, 'square'); // GONG
        await speak("Quinze secondes pour convaincre.");
        let dTime = 15;
        const dInterval = setInterval(() => {
            document.getElementById('big-timer').innerText = dTime;
            playTone(60, 0.2, 0.1); // Battement rapide
            if(dTime <= 0) {
                clearInterval(dInterval);
                playTone(100, 2, 0.4, 'square'); // GONG FIN
                speak("Votez ! 3... 2... 1... Votez !");
                document.getElementById('defense-btn').disabled = false;
            }
            dTime--;
        }, 1000);
    }
</script>
</body>
</html>
